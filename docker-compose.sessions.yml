# AUTO-GENERATED by scripts/generate-compose.py — do not edit by hand.
# Regenerate with: python3 scripts/generate-compose.py
#
# Starts one container per local session (Claude or Codex).
# Each container runs mcp-server + session-loop under s6-overlay.

services:
  session-ha:
    image: relay-session:latest
    build:
      context: .
      dockerfile: session.Dockerfile
    container_name: relay-session-ha
    restart: always
    mem_limit: 512m
    memswap_limit: 768m
    environment:
      SESSION_NAME: "ha"
      TELEGRAM_THREAD_ID: "11394"
      WORKDIR: "/root/ha-skill"
      AUTO_COMPACT_THRESHOLD: "40000"
      CLAUDE_CODE_ENABLE_TELEMETRY: "1"
      OTEL_LOGS_EXPORTER: "console"
      OTEL_LOG_TOOL_DETAILS: "1"
    volumes:
      # Shared queue between bot and session containers
      - relay-queue:/tmp
      # Relay env file for the MCP bridge only; do not inject bot creds into Claude/Codex
      - /root/relay/.env:/root/relay/.env:ro
      # Live sessions.json so the session loop can find thread_ids (overrides baked-in empty copy)
      - /root/relay/sessions.json:/relay/sessions.json:ro
      # Claude credentials and global state (directory + auth file)
      - /root/.claude:/root/.claude
      - /root/.claude.json:/root/.claude.json
      # Docker socket — allows session to manage containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Project working directory
      - /root/ha-skill:/root/ha-skill
    depends_on:
      - relay
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "claude"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

