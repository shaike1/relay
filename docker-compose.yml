services:
  relay:
    image: topix-relay:latest
    build: .                             # build from local Dockerfile
    container_name: relay
    restart: always
    env_file:
      - .env
    environment:
      RELAY_BOT_ROLE: "primary"
      WEBHOOK_MODE: "1"
    volumes:
      # Full home dir — covers all local Claude sessions and ~/.claude state.
      # If your sessions are all remote (SSH), replace this with targeted mounts:
      #   - ~/.claude:/root/.claude
      #   - ~/.ssh:/root/.ssh:ro
      - /root:/root
      # Shared /tmp for queue files written by bot, read by session containers.
      # When running with docker-compose.sessions.yml, relay-queue volume is used
      # instead (shared named volume mounted at /tmp in both bot and sessions).
      # For standalone bot-only deployments, the host /tmp bind mount is fine.
      - relay-queue:/tmp
      # Runtime state files — bot reads these from its WORKDIR (/relay)
      # but they live on the host at /root/relay/
      - /root/relay/sessions.json:/relay/sessions.json
      - /root/relay/hosts.json:/relay/hosts.json
      - /root/relay/peers-topic.json:/relay/peers-topic.json
      # Source files — mount from host so changes take effect without rebuilding
      - /root/relay/bot.py:/relay/bot.py
      - /root/relay/mcp-telegram/server.ts:/relay/mcp-telegram/server.ts
      # Docker socket — allows bot and sessions to manage containers
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  relay-nomacode:
    image: node:22-slim
    container_name: relay-nomacode
    restart: always
    working_dir: /nomacode
    command: >
      sh -c "npm install --omit=dev --quiet 2>/dev/null; node bin/nomacode.js"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      SHELL: "/root/relay/scripts/hub.sh"
      NOMACODE_USER: "relay"
      NOMACODE_PASS: "${RELAY_API_PASS:-PKNfwGoX4-8-LHsxhVphvQ}"
    expose:
      - "3000"
    volumes:
      - /root/nomacode:/nomacode
      - /root:/root
      - /var/run/docker.sock:/var/run/docker.sock
      - relay-queue:/tmp/relay-sessions
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  relay-api:
    build: ./relay-api
    container_name: relay-api
    restart: always
    depends_on:
      - relay-nomacode
      - relay
    ports:
      - "7070:7070"
    environment:
      PORT: "7070"
      NOMACODE_URL: "http://relay-nomacode:3000"
      SESSIONS_FILE: "/relay/sessions.json"
      AUTH_USER: "relay"
      AUTH_PASS: "${RELAY_API_PASS:-PKNfwGoX4-8-LHsxhVphvQ}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      GROUP_CHAT_ID: "${GROUP_CHAT_ID}"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-codex-relay-wh-2026}"
    volumes:
      - /root/relay/relay-api/server.js:/relay-api/server.js:ro
      - /root/relay/sessions.json:/relay/sessions.json
      - /root/relay/templates.json:/relay/templates.json
      - /root/relay/metrics.html:/relay/metrics.html:ro
      - /root/relay/config.html:/relay/config.html:ro
      - /root/relay/sessions-ui.html:/relay/sessions-ui.html:ro
      - /root/relay/session-detail.html:/relay/session-detail.html:ro
      - /root/relay/tasks-dashboard.html:/relay/tasks-dashboard.html:ro
      - /root/relay/orchestrator.html:/relay/orchestrator.html:ro
      - /root/relay/pipeline.html:/relay/pipeline.html:ro
      - /root/relay/scripts:/relay/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - relay-queue:/tmp
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default
      - relay_default
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  whatsapp-bridge:
    build: ./whatsapp-bridge
    container_name: whatsapp-bridge
    restart: always
    profiles:
      - whatsapp
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${GROUP_CHAT_ID}"
      WA_QR_THREAD_ID: "${WA_QR_THREAD_ID:-183}"
      WA_SESSION_DIR: "/wa-session"
      WA_BRIDGE_PORT: "9103"
      WA_DEFAULT_THREAD_ID: "${WA_DEFAULT_THREAD_ID:-}"
      SESSIONS_FILE: "/relay/sessions.json"
      QUEUE_DIR: "/tmp"
    expose:
      - "9103"
    volumes:
      - /root/relay/sessions.json:/relay/sessions.json:ro
      - relay-queue:/tmp
      - wa-session:/wa-session
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  discord-bridge:
    build: ./discord-bridge
    container_name: discord-bridge
    restart: always
    profiles:
      - discord
    environment:
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN:-}"
      DISCORD_BRIDGE_PORT: "9102"
      SESSIONS_FILE: "/relay/sessions.json"
      QUEUE_DIR: "/tmp"
    expose:
      - "9102"
    volumes:
      - /root/relay/sessions.json:/relay/sessions.json:ro
      - relay-queue:/tmp
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  relay_default:
    external: true

volumes:
  relay-queue:
    external: true
  wa-session:
