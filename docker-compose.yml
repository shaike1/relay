services:
  relay:
    image: topix-relay:latest
    build: .                             # build from local Dockerfile
    container_name: relay
    restart: always
    env_file:
      - .env
    environment:
      RELAY_BOT_ROLE: "primary"
    volumes:
      # Full home dir — covers all local Claude sessions and ~/.claude state.
      # If your sessions are all remote (SSH), replace this with targeted mounts:
      #   - ~/.claude:/root/.claude
      #   - ~/.ssh:/root/.ssh:ro
      - /root:/root
      # Shared /tmp for queue files written by bot, read by session containers.
      # When running with docker-compose.sessions.yml, relay-queue volume is used
      # instead (shared named volume mounted at /tmp in both bot and sessions).
      # For standalone bot-only deployments, the host /tmp bind mount is fine.
      - relay-queue:/tmp
      # Runtime state files — bot reads these from its WORKDIR (/relay)
      # but they live on the host at /root/relay/
      - /root/relay/sessions.json:/relay/sessions.json
      - /root/relay/hosts.json:/relay/hosts.json
      - /root/relay/peers-topic.json:/relay/peers-topic.json
      # Source files — mount from host so changes take effect without rebuilding
      - /root/relay/bot.py:/relay/bot.py
      - /root/relay/mcp-telegram/server.ts:/relay/mcp-telegram/server.ts
      # Docker socket — allows bot and sessions to manage containers
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  relay-api:
    build: ./relay-api
    container_name: relay-api
    restart: always
    ports:
      - "7070:7070"
    environment:
      PORT: "7070"
      NOMACODE_URL: "http://relay-nomacode:3000"
      SESSIONS_FILE: "/relay/sessions.json"
      AUTH_USER: "relay"
      AUTH_PASS: "${RELAY_API_PASS:-PKNfwGoX4-8-LHsxhVphvQ}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      GROUP_CHAT_ID: "${GROUP_CHAT_ID}"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-codex-relay-wh-2026}"
    volumes:
      - /root/relay/relay-api/server.js:/relay-api/server.js:ro
      - /root/relay/sessions.json:/relay/sessions.json
      - /root/relay/templates.json:/relay/templates.json
      - /root/relay/metrics.html:/relay/metrics.html:ro
      - /root/relay/config.html:/relay/config.html:ro
      - /root/relay/sessions-ui.html:/relay/sessions-ui.html:ro
      - /root/relay/session-detail.html:/relay/session-detail.html:ro
      - /root/relay/tasks-dashboard.html:/relay/tasks-dashboard.html:ro
      - /root/relay/orchestrator.html:/relay/orchestrator.html:ro
      - /root/relay/pipeline.html:/relay/pipeline.html:ro
      - /root/relay/scripts:/relay/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - relay-queue:/tmp
    networks:
      - default
      - relay_default
      - tala-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  caddy:
    image: caddy:2.6.2
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /root/relay/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_conf:/config
    networks:
      - default
      - relay_default
      - tala-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  relay_default:
    external: true
  tala-net:
    external: true

volumes:
  relay-queue:
    external: true
  caddy_data:
    external: true
    name: root_caddy_data
  caddy_conf:
    external: true
    name: root_caddy_conf
