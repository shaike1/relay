<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Relay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      /* Telegram native theme vars — populated by SDK via CSS vars */
      --bg:       var(--tg-theme-bg-color, #212121);
      --surface:  var(--tg-theme-secondary-bg-color, #2c2c2c);
      --text:     var(--tg-theme-text-color, #e8e8e8);
      --muted:    var(--tg-theme-hint-color, #9e9e9e);
      --accent:   var(--tg-theme-button-color, #2196F3);
      --accent-text: var(--tg-theme-button-text-color, #ffffff);
      --link:     var(--tg-theme-link-color, #2196F3);

      /* Derived / fixed colors */
      --card:     rgba(255,255,255,0.06);
      --border:   rgba(255,255,255,0.10);
      --green:    #4CAF50;
      --red:      #f44336;
      --orange:   #FF9800;

      /* Layout */
      --bottom-nav-height: 60px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100%;
      overflow: hidden;
    }

    /* ── App shell ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    /* ── Bottom navigation ── */
    .bottom-nav {
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      padding-bottom: var(--safe-bottom);
      height: calc(var(--bottom-nav-height) + var(--safe-bottom));
      position: relative;
      z-index: 50;
    }
    .nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 8px 4px 4px;
      font-size: 10px;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      transition: color 0.2s;
      letter-spacing: 0.3px;
    }
    .nav-tab.active { color: var(--accent); }
    .nav-tab .tab-icon { font-size: 22px; line-height: 1; }

    /* ── Screens ── */
    .screen-stack {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .screen {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      overflow: hidden;
    }
    .screen.active { display: flex; }

    /* ── Sticky header ── */
    .screen-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .screen-header h1 {
      font-size: 17px;
      font-weight: 600;
      flex: 1;
    }
    .back-btn {
      background: none;
      border: none;
      color: var(--link);
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }
    .header-action-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
    }

    /* ── Status dot ── */
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.orange { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
    .status-dot.red    { background: var(--red); }

    /* ── Pull-to-refresh ── */
    .ptr-indicator {
      text-align: center;
      padding: 10px 8px 4px;
      color: var(--muted);
      font-size: 12px;
      height: 0;
      overflow: hidden;
      transition: height 0.2s;
    }
    .ptr-indicator.visible { height: 34px; }

    /* ── Sessions list ── */
    .sessions-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    .sessions-list {
      padding: 12px 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Card-style sessions */
    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: opacity 0.15s;
      -webkit-user-select: none;
      user-select: none;
    }
    .session-card:active { opacity: 0.7; }

    .session-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .session-info { flex: 1; min-width: 0; }
    .session-name {
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .session-badge {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1px 6px;
      font-size: 11px;
    }
    .session-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .session-time {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Skeleton loaders */
    @keyframes shimmer {
      0%   { background-position: -300px 0; }
      100% { background-position: 300px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--card) 50%, var(--surface) 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 8px;
    }
    .skeleton-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .skeleton-avatar { width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .skeleton-line { height: 14px; }
    .skeleton-line.short { width: 60%; }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: calc(var(--bottom-nav-height) + var(--safe-bottom) + 16px);
      right: 20px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: var(--accent-text);
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      z-index: 100;
      transition: transform 0.1s;
    }
    .fab:active { transform: scale(0.93); }

    /* ── Session detail (full-screen overlay) ── */
    #screen-detail {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 200;
      flex-direction: column;
    }
    #screen-detail.active { display: flex; }

    .offline-badge {
      background: var(--red);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 12px;
      white-space: nowrap;
    }

    /* Messages */
    .messages-list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg-row {
      display: flex;
      flex-direction: column;
    }
    .msg-row.user   { align-items: flex-end; }
    .msg-row.assistant { align-items: flex-start; }
    .msg-row.tool   { align-items: flex-start; }

    .msg-bubble {
      max-width: 82%;
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }
    .msg-row.user .msg-bubble {
      background: var(--accent);
      color: var(--accent-text);
      border-bottom-right-radius: 4px;
    }
    .msg-row.assistant .msg-bubble {
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }
    .msg-row.tool .msg-bubble {
      background: var(--surface);
      color: var(--muted);
      border-radius: 10px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      border-left: 3px solid var(--orange);
      border-top: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .msg-time {
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
      padding: 0 4px;
    }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
    }
    .typing-indicator.visible { display: flex; }
    .typing-dot {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: typingBounce 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Quick actions */
    .quick-actions {
      display: flex;
      gap: 8px;
      padding: 8px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .quick-actions::-webkit-scrollbar { display: none; }
    .quick-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .quick-btn:active { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }
    .quick-btn .btn-icon { font-size: 15px; }

    /* Message input bar */
    .msg-input-bar {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px calc(10px + var(--safe-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .msg-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 9px 14px;
      color: var(--text);
      font-size: 15px;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      outline: none;
      font-family: inherit;
    }
    .msg-input:focus { border-color: var(--accent); }
    .msg-input::placeholder { color: var(--muted); }
    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: var(--accent-text);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .send-btn:disabled { opacity: 0.35; cursor: default; }

    /* ── Stats screen ── */
    .stats-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .stats-section { padding: 16px; }
    .stats-card {
      background: var(--surface);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .stats-card h3 {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-val { font-weight: 600; color: var(--link); }

    /* ── Settings screen ── */
    .settings-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .settings-section { padding: 16px; }
    .settings-card {
      background: var(--surface);
      border-radius: 14px;
      padding: 0;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .settings-row {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
      gap: 12px;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-icon { font-size: 20px; width: 28px; text-align: center; }
    .settings-row-label { flex: 1; color: var(--text); }
    .settings-row-value { color: var(--muted); font-size: 14px; }
    .settings-section-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 4px 8px;
      margin-bottom: 2px;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 26px;
      flex-shrink: 0;
    }
    .toggle input { display: none; }
    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 13px;
      background: var(--border);
      transition: background 0.2s;
      cursor: pointer;
    }
    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle-thumb {
      position: absolute;
      width: 20px; height: 20px;
      background: #fff;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: transform 0.2s;
      pointer-events: none;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

    .settings-btn {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: none;
      background: var(--accent);
      color: var(--accent-text);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      padding: 40px;
      text-align: center;
      gap: 12px;
      min-height: 200px;
    }
    .empty-icon { font-size: 52px; }
    .empty-text { font-size: 15px; line-height: 1.5; }
    .retry-btn {
      margin-top: 8px;
      padding: 9px 22px;
      border-radius: 20px;
      border: none;
      background: var(--accent);
      color: var(--accent-text);
      font-size: 14px;
      cursor: pointer;
    }

    /* ── Loading spinner (inline) ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 300;
      align-items: flex-end;
    }
    .modal-overlay.active { display: flex; }
    .modal-sheet {
      background: var(--surface);
      border-radius: 18px 18px 0 0;
      padding: 20px 16px calc(20px + var(--safe-bottom));
      width: 100%;
      max-height: 75vh;
    }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 18px;
    }
    .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
    .modal-session-select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 14px;
      border-radius: 12px;
      font-size: 15px;
      margin-bottom: 12px;
      outline: none;
    }
    .modal-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 14px;
      border-radius: 12px;
      font-size: 15px;
      resize: none;
      height: 90px;
      outline: none;
      font-family: inherit;
      margin-bottom: 12px;
    }
    .modal-textarea:focus, .modal-session-select:focus { border-color: var(--accent); }
    .modal-btn-row { display: flex; gap: 8px; }
    .btn-primary {
      flex: 1;
      padding: 13px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: var(--accent-text);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-secondary {
      padding: 13px 22px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Main screen stack -->
  <div class="screen-stack">

    <!-- Screen: Sessions List -->
    <section class="screen active" id="screen-sessions">
      <div class="screen-header">
        <h1>Relay Sessions</h1>
        <button class="header-action-btn" onclick="loadSessions()" title="Refresh" aria-label="Refresh">↻</button>
      </div>
      <div class="ptr-indicator" id="ptr-indicator">↓ Pull to refresh</div>
      <div class="sessions-scroll" id="sessions-scroll">
        <div class="sessions-list" id="sessions-content">
          <!-- skeleton placeholders -->
          <div class="skeleton-card"><div class="skeleton skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div></div>
          <div class="skeleton-card"><div class="skeleton skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div></div>
          <div class="skeleton-card"><div class="skeleton skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div></div>
        </div>
      </div>
    </section>

    <!-- Screen: Stats -->
    <section class="screen" id="screen-stats">
      <div class="screen-header">
        <h1>Token Stats</h1>
      </div>
      <div class="stats-scroll">
        <div id="stats-content" class="stats-section">
          <div class="empty-state"><span class="empty-icon">📊</span><span class="empty-text">Switch to this tab to load stats</span></div>
        </div>
      </div>
    </section>

    <!-- Screen: Settings -->
    <section class="screen" id="screen-settings">
      <div class="screen-header">
        <h1>Settings</h1>
      </div>
      <div class="settings-scroll">
        <div class="settings-section" id="settings-content">
          <!-- populated by renderSettings() -->
        </div>
      </div>
    </section>

  </div><!-- /screen-stack -->

  <!-- Bottom navigation -->
  <nav class="bottom-nav">
    <button class="nav-tab active" onclick="showTab('sessions')" id="tab-sessions">
      <span class="tab-icon">🏠</span>Sessions
    </button>
    <button class="nav-tab" onclick="showTab('stats')" id="tab-stats">
      <span class="tab-icon">📊</span>Stats
    </button>
    <button class="nav-tab" onclick="showTab('settings')" id="tab-settings">
      <span class="tab-icon">⚙️</span>Settings
    </button>
  </nav>

  <!-- FAB: compose new message -->
  <button class="fab" onclick="openNewMessageModal()" id="fab-compose" title="New message" aria-label="New message">＋</button>

</div><!-- /#app -->

<!-- Session Detail Screen (full-screen overlay) -->
<div id="screen-detail">
  <div class="screen-header">
    <button class="back-btn" onclick="closeDetail()" aria-label="Back">‹</button>
    <span class="status-dot red" id="detail-status-dot"></span>
    <h1 id="detail-title">Session</h1>
    <span id="detail-offline-badge" class="offline-badge" style="display:none">Offline</span>
  </div>
  <div class="messages-list" id="detail-messages">
    <div class="empty-state"><span class="empty-icon">💬</span><span class="empty-text">Loading messages…</span></div>
  </div>
  <div class="typing-indicator" id="typing-indicator">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>
  <div class="quick-actions" id="quick-actions-row">
    <button class="quick-btn" onclick="sendQuick('restart')"><span class="btn-icon">🔄</span> Restart</button>
    <button class="quick-btn" onclick="sendQuick('cancel')"><span class="btn-icon">✖</span> Cancel</button>
    <button class="quick-btn" onclick="sendQuick('screenshot')"><span class="btn-icon">📸</span> Screenshot</button>
    <button class="quick-btn" onclick="sendQuick('status')"><span class="btn-icon">ℹ️</span> Status</button>
  </div>
  <div class="msg-input-bar">
    <textarea class="msg-input" id="msg-input" placeholder="Message…" rows="1"
      oninput="autoResize(this); updateSendBtn()" onkeydown="msgKeydown(event)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled aria-label="Send">➤</button>
  </div>
</div>

<!-- New Message Modal -->
<div class="modal-overlay" id="modal-new" onclick="modalOverlayClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">New Message</div>
    <select class="modal-session-select" id="modal-session-select">
      <option value="">— Select session —</option>
    </select>
    <textarea class="modal-textarea" id="modal-text" placeholder="Type your message…"></textarea>
    <div class="modal-btn-row">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="sendModalMessage()">Send</button>
    </div>
  </div>
</div>

<script>
// ── Telegram Web App init ────────────────────────────────────────────────────
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ── State ───────────────────────────────────────────────────────────────────
let sessions = [];
let currentSession = null;
let currentSessionData = null;
let sendingMsg = false;
const INIT_DATA = tg.initData || '';

// Version shown in Settings
const APP_VERSION = '2.0.0';

// ── Tab navigation ───────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');

  const fab = document.getElementById('fab-compose');
  fab.style.display = name === 'sessions' ? 'flex' : 'none';

  if (name === 'stats') loadStats();
  if (name === 'settings') renderSettings();
}

// ── Session type icon ────────────────────────────────────────────────────────
function sessionIcon(name) {
  const n = (name || '').toLowerCase();
  if (n.includes('codex'))   return '📝';
  if (n.includes('copilot')) return '🛠';
  return '🤖'; // default: claude
}

// ── Status dot class from last_active timestamp ──────────────────────────────
function statusDotClass(lastActive, status) {
  if (status === 'stopped') return 'red';
  if (!lastActive) return 'red';
  const diffSec = Date.now() / 1000 - lastActive;
  if (diffSec < 300)  return 'green';   // < 5 min
  if (diffSec < 1800) return 'orange';  // < 30 min
  return 'red';
}

function timeAgo(ts) {
  if (!ts) return 'never';
  const diff = Date.now() / 1000 - ts;
  if (diff < 60)    return 'just now';
  if (diff < 3600)  return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

// ── Sessions list ────────────────────────────────────────────────────────────
async function loadSessions() {
  showSkeletons();
  try {
    const r = await fetch('/miniapp/sessions');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    sessions = await r.json();
    renderSessions();
  } catch (e) {
    showSessionsError(e.message);
  }
}

function showSkeletons() {
  document.getElementById('sessions-content').innerHTML =
    Array(3).fill(0).map(() =>
      `<div class="skeleton-card">
        <div class="skeleton skeleton-avatar"></div>
        <div class="skeleton-lines">
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line short"></div>
        </div>
      </div>`
    ).join('');
}

function showSessionsError(msg) {
  document.getElementById('sessions-content').innerHTML =
    `<div class="empty-state">
      <span class="empty-icon">⚠️</span>
      <span class="empty-text">Failed to load sessions<br><small>${escHtml(msg)}</small></span>
      <button class="retry-btn" onclick="loadSessions()">Retry</button>
    </div>`;
}

function renderSessions() {
  const el = document.getElementById('sessions-content');
  if (!sessions.length) {
    el.innerHTML = `<div class="empty-state">
      <span class="empty-icon">🤖</span>
      <span class="empty-text">No sessions configured</span>
    </div>`;
    return;
  }
  el.innerHTML = sessions.map(s => {
    const icon = sessionIcon(s.session);
    const dotClass = statusDotClass(s.last_active, s.status);
    const lastActive = timeAgo(s.last_active);
    const groupLabel = s.group ? `<span class="session-badge">${escHtml(s.group)}</span>` : '';
    return `<div class="session-card" onclick="openDetail('${escAttr(s.session)}', '${escAttr(s.thread_id || '')}', '${escAttr(s.status)}', ${s.last_active || 0})">
      <div class="session-avatar">${icon}</div>
      <div class="session-info">
        <div class="session-name">${escHtml(s.session)}</div>
        <div class="session-meta">${groupLabel}<span>${escHtml(s.status || 'unknown')}</span></div>
      </div>
      <div class="session-right">
        <span class="session-time">${lastActive}</span>
        <span class="status-dot ${dotClass}"></span>
      </div>
    </div>`;
  }).join('');

  // Populate modal session select
  const sel = document.getElementById('modal-session-select');
  sel.innerHTML = '<option value="">— Select session —</option>' +
    sessions.map(s => `<option value="${escAttr(s.session)}">${escHtml(s.session)}</option>`).join('');
}

// ── Pull-to-refresh ──────────────────────────────────────────────────────────
(function initPTR() {
  const scrollEl = document.getElementById('sessions-scroll');
  const indicator = document.getElementById('ptr-indicator');
  let startY = 0;
  let refreshing = false;

  scrollEl.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
  }, { passive: true });

  scrollEl.addEventListener('touchend', async e => {
    if (refreshing) return;
    const dy = e.changedTouches[0].clientY - startY;
    if (scrollEl.scrollTop === 0 && dy > 55) {
      refreshing = true;
      indicator.textContent = '↻ Refreshing…';
      indicator.classList.add('visible');
      await loadSessions();
      indicator.classList.remove('visible');
      indicator.textContent = '↓ Pull to refresh';
      refreshing = false;
    }
  }, { passive: true });
})();

// ── Session detail ───────────────────────────────────────────────────────────
async function openDetail(sessionName, threadId, status, lastActive) {
  currentSession = sessionName;
  currentSessionData = { sessionName, threadId, status, lastActive };

  document.getElementById('detail-title').textContent = sessionName;

  const dotClass = statusDotClass(lastActive, status);
  const dot = document.getElementById('detail-status-dot');
  dot.className = 'status-dot ' + dotClass;

  const offlineBadge = document.getElementById('detail-offline-badge');
  const quickActions = document.getElementById('quick-actions-row');
  const isOffline = dotClass === 'red' && status !== 'running';

  if (isOffline) {
    offlineBadge.style.display = '';
    quickActions.style.display = 'none';
  } else {
    offlineBadge.style.display = 'none';
    quickActions.style.display = '';
  }

  document.getElementById('msg-input').value = '';
  updateSendBtn();
  document.getElementById('screen-detail').classList.add('active');
  document.getElementById('typing-indicator').classList.remove('visible');
  await loadMessages();
}

function closeDetail() {
  document.getElementById('screen-detail').classList.remove('active');
  currentSession = null;
  currentSessionData = null;
}

async function loadMessages() {
  const el = document.getElementById('detail-messages');
  el.innerHTML = `<div class="empty-state"><span class="empty-icon">💬</span><span class="empty-text">Loading messages…</span></div>`;
  try {
    const r = await fetch(`/miniapp/history/${encodeURIComponent(currentSession)}`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const events = await r.json();
    renderMessages(events);
  } catch (e) {
    el.innerHTML = `<div class="empty-state">
      <span class="empty-icon">⚠️</span>
      <span class="empty-text">${escHtml(e.message)}</span>
      <button class="retry-btn" onclick="loadMessages()">Retry</button>
    </div>`;
  }
}

function renderMessages(events) {
  const el = document.getElementById('detail-messages');
  if (!events.length) {
    el.innerHTML = `<div class="empty-state"><span class="empty-icon">💬</span><span class="empty-text">No messages yet</span></div>`;
    return;
  }
  el.innerHTML = events.map(e => {
    const time = e.ts ? new Date(e.ts * 1000 > 1e12 ? e.ts : e.ts * 1000)
      .toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}) : '';

    if (e.type === 'tool') {
      return `<div class="msg-row tool">
        <div class="msg-bubble">🔧 ${escHtml(e.tool || '')} ${escHtml(e.command || '')}</div>
        ${time ? `<div class="msg-time">${time}</div>` : ''}
      </div>`;
    }
    const isUser = e.role === 'user' || (e.user && e.user !== 'assistant' && e.type === 'message');
    const cls = isUser ? 'user' : 'assistant';
    return `<div class="msg-row ${cls}">
      <div class="msg-bubble">${escHtml(e.text || '')}</div>
      ${time ? `<div class="msg-time">${time}</div>` : ''}
    </div>`;
  }).join('');

  // Auto-scroll to bottom
  el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || sendingMsg || !currentSession) return;

  sendingMsg = true;
  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="spinner"></span>';
  input.value = '';
  input.style.height = '';

  // Show typing indicator
  const typingEl = document.getElementById('typing-indicator');
  typingEl.classList.add('visible');

  // Optimistically add user bubble
  const el = document.getElementById('detail-messages');
  const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
  el.insertAdjacentHTML('beforeend',
    `<div class="msg-row user">
      <div class="msg-bubble">${escHtml(text)}</div>
      <div class="msg-time">${now}</div>
    </div>`
  );
  el.scrollTop = el.scrollHeight;

  try {
    const r = await fetch('/miniapp/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ session: currentSession, text, init_data: INIT_DATA }),
    });
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      throw new Error(d.error || 'HTTP ' + r.status);
    }
  } catch (e) {
    tg.showAlert('Send failed: ' + e.message);
  } finally {
    sendingMsg = false;
    sendBtn.disabled = false;
    sendBtn.innerHTML = '➤';
    typingEl.classList.remove('visible');
    updateSendBtn();
  }
}

async function sendQuick(action) {
  const cmds = { restart: '/restart', cancel: '/cancel', screenshot: '/screenshot', status: '/status' };
  const text = cmds[action];
  if (!text || !currentSession) return;
  try {
    await fetch('/miniapp/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ session: currentSession, text, init_data: INIT_DATA }),
    });
    tg.showAlert('Command sent: ' + text);
  } catch (e) {
    tg.showAlert('Failed: ' + e.message);
  }
}

function updateSendBtn() {
  const input = document.getElementById('msg-input');
  const btn = document.getElementById('send-btn');
  btn.disabled = !input.value.trim() || sendingMsg;
}

// ── New Message Modal ────────────────────────────────────────────────────────
function openNewMessageModal() {
  document.getElementById('modal-new').classList.add('active');
  setTimeout(() => document.getElementById('modal-text').focus(), 150);
}
function closeModal() {
  document.getElementById('modal-new').classList.remove('active');
  document.getElementById('modal-text').value = '';
}
function modalOverlayClick(e) {
  if (e.target === document.getElementById('modal-new')) closeModal();
}
async function sendModalMessage() {
  const sel = document.getElementById('modal-session-select');
  const text = document.getElementById('modal-text').value.trim();
  const sessionName = sel.value;
  if (!sessionName) { tg.showAlert('Please select a session'); return; }
  if (!text) { tg.showAlert('Please enter a message'); return; }
  try {
    const r = await fetch('/miniapp/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ session: sessionName, text, init_data: INIT_DATA }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    closeModal();
    tg.showAlert('Message sent!');
  } catch (e) {
    tg.showAlert('Send failed: ' + e.message);
  }
}

// ── Stats ────────────────────────────────────────────────────────────────────
async function loadStats() {
  const el = document.getElementById('stats-content');
  el.innerHTML = `<div class="empty-state"><span class="empty-icon">⏳</span><span class="empty-text">Loading stats…</span></div>`;

  if (!sessions.length) {
    try {
      const r = await fetch('/miniapp/sessions');
      if (r.ok) sessions = await r.json();
    } catch (_) {}
  }
  if (!sessions.length) {
    el.innerHTML = `<div class="empty-state"><span class="empty-icon">📊</span><span class="empty-text">No sessions to show</span></div>`;
    return;
  }

  const results = await Promise.all(sessions.map(async s => {
    try {
      const r = await fetch(`/miniapp/stats/${encodeURIComponent(s.session)}`);
      if (!r.ok) return { session: s.session, error: true };
      return { session: s.session, ...(await r.json()) };
    } catch (_) { return { session: s.session, error: true }; }
  }));

  let html = '';
  for (const d of results) {
    if (d.error || !d.daily || !d.daily.length) continue;
    const totalIn  = d.daily.reduce((s, r) => s + (r.input_tokens  || 0), 0);
    const totalOut = d.daily.reduce((s, r) => s + (r.output_tokens || 0), 0);
    const totalCost = d.daily.reduce((s, r) => s + (r.cost_usd     || 0), 0);
    html += `<div class="stats-card">
      <h3>${escHtml(d.session)}</h3>
      <div class="stat-row"><span>Input tokens</span><span class="stat-val">${totalIn.toLocaleString()}</span></div>
      <div class="stat-row"><span>Output tokens</span><span class="stat-val">${totalOut.toLocaleString()}</span></div>
      <div class="stat-row"><span>Est. cost</span><span class="stat-val">$${totalCost.toFixed(4)}</span></div>
    </div>`;
  }
  el.innerHTML = html || `<div class="empty-state"><span class="empty-icon">📊</span><span class="empty-text">No token data available</span></div>`;
}

// ── Settings ─────────────────────────────────────────────────────────────────
function renderSettings() {
  const el = document.getElementById('settings-content');
  const colorScheme = tg.colorScheme || 'dark';
  const activeSessions = sessions.filter(s => {
    const diff = s.last_active ? Date.now() / 1000 - s.last_active : Infinity;
    return diff < 300;
  }).length;
  const botName = tg.initDataUnsafe?.bot?.username || 'relay_bot';
  const dashboardUrl = window.location.origin.replace(/miniapp.*/, '') || 'https://your-dashboard.example.com';

  el.innerHTML = `
    <div class="settings-section-label">About</div>
    <div class="settings-card">
      <div class="settings-row">
        <span class="settings-row-icon">🤖</span>
        <span class="settings-row-label">Bot</span>
        <span class="settings-row-value">@${escHtml(botName)}</span>
      </div>
      <div class="settings-row">
        <span class="settings-row-icon">🔗</span>
        <span class="settings-row-label">Connected sessions</span>
        <span class="settings-row-value">${sessions.length} (${activeSessions} active)</span>
      </div>
      <div class="settings-row">
        <span class="settings-row-icon">📦</span>
        <span class="settings-row-label">Version</span>
        <span class="settings-row-value">${escHtml(APP_VERSION)}</span>
      </div>
    </div>

    <div class="settings-section-label">Appearance</div>
    <div class="settings-card">
      <div class="settings-row">
        <span class="settings-row-icon">${colorScheme === 'dark' ? '🌙' : '☀️'}</span>
        <span class="settings-row-label">Theme</span>
        <span class="settings-row-value">${colorScheme === 'dark' ? 'Dark' : 'Light'} (system)</span>
      </div>
    </div>

    <div class="settings-section-label">Actions</div>
    <button class="settings-btn" onclick="openDashboard()">
      🌐 Open full dashboard
    </button>
  `;
}

function openDashboard() {
  const url = window.location.origin.replace(/\/miniapp.*/, '');
  tg.openLink(url || 'https://your-dashboard.example.com');
}

// ── Input helpers ─────────────────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function msgKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function escAttr(str) {
  return String(str).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadSessions();
</script>
</body>
</html>
