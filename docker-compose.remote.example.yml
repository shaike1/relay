# AUTO-GENERATED by scripts/generate-compose.py — do not edit by hand.
# Regenerate with: python3 scripts/generate-compose.py --remote
#
# Remote session containers for root@your-remote-host.
# Deploy: scp this file + .env to root@your-remote-host, then: docker compose -f <file> up -d
# /tmp is bind-mounted from the host so the relay bot can write queue files via SSH.

services:
  session-edushare:
    image: shaikeme/relay-sessions:latest
    container_name: relay-session-edushare
    restart: always
    environment:
      SESSION_NAME: "edushare"
      TELEGRAM_THREAD_ID: "12"
      WORKDIR: "/root/.openclaw/workspace/edushare"
    volumes:
      # Shared queue between bot and session containers
      - /tmp:/tmp
      # Relay env file for the MCP bridge only; do not inject bot creds into Claude/Codex
      - /root/relay/.env:/root/relay/.env:ro
      # Claude credentials and global state (directory + auth file)
      - /root/.claude:/root/.claude
      - /root/.claude.json:/root/.claude.json
      # Docker socket — allows session to manage containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Project working directory
      - /root/.openclaw/workspace/edushare:/root/.openclaw/workspace/edushare
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "claude"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

