<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Relay Metrics</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh; background: #0d1117; color: #c9d1d9;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px;
    padding: 20px;
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid #21262d;
  }
  .header h1 { font-size: 18px; font-weight: 400; color: #f0f6fc; }
  .header-controls { display: flex; gap: 16px; align-items: center; }
  .header .refresh { color: #58a6ff; cursor: pointer; font-size: 12px; }
  .header .refresh:hover { text-decoration: underline; }

  /* View toggle */
  .view-toggle {
    display: flex; gap: 2px; background: #21262d; border-radius: 6px; padding: 2px;
  }
  .view-btn {
    background: transparent; border: none; color: #8b949e; cursor: pointer;
    font-size: 11px; font-family: inherit; padding: 4px 10px; border-radius: 4px;
    transition: all 0.2s;
  }
  .view-btn:hover { color: #c9d1d9; }
  .view-btn.active { background: #161b22; color: #58a6ff; }

  /* Sort controls */
  .sort-bar {
    display: flex; gap: 8px; align-items: center; margin-bottom: 16px;
    font-size: 12px; color: #8b949e;
  }
  .sort-bar span { color: #6e7681; }
  .sort-btn {
    background: #161b22; border: 1px solid #21262d; border-radius: 4px;
    padding: 4px 10px; color: #8b949e; cursor: pointer; font-size: 11px;
    font-family: inherit; transition: all 0.2s;
  }
  .sort-btn:hover { border-color: #30363d; color: #c9d1d9; }
  .sort-btn.active { border-color: #58a6ff; color: #58a6ff; }

  /* Health score */
  .health-bar {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 16px 20px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 20px;
  }
  .health-score {
    font-size: 36px; font-weight: 600; min-width: 60px; text-align: center;
  }
  .health-details { flex: 1; }
  .health-label { font-size: 11px; color: #8b949e; text-transform: uppercase; margin-bottom: 4px; }
  .health-meter {
    height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; margin-bottom: 8px;
  }
  .health-meter-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .health-breakdown {
    display: flex; gap: 16px; font-size: 11px; color: #8b949e;
  }
  .health-breakdown .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px;
    vertical-align: middle;
  }

  .stats {
    display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .stat {
    background: #161b22; border: 1px solid #21262d; border-radius: 6px;
    padding: 12px 16px; min-width: 120px;
  }
  .stat .label { font-size: 11px; color: #8b949e; text-transform: uppercase; }
  .stat .value { font-size: 24px; color: #f0f6fc; margin-top: 4px; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
  }

  /* Group view */
  .group-section { margin-bottom: 24px; }
  .group-header {
    font-size: 13px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px;
    padding: 8px 0; margin-bottom: 8px; border-bottom: 1px solid #21262d;
    display: flex; justify-content: space-between; align-items: center;
  }
  .group-header .group-name { color: #58a6ff; }
  .group-header .group-count { font-size: 11px; color: #6e7681; }
  .group-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
  }

  .card {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 16px; transition: border-color 0.2s; cursor: pointer;
  }
  .card:hover { border-color: #30363d; }
  .card.expanded { border-color: #58a6ff; }
  .card .top { display: flex; justify-content: space-between; align-items: center; }
  .card .name { font-size: 15px; color: #f0f6fc; font-weight: 500; }
  .card .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 12px;
    text-transform: uppercase; font-weight: 500;
  }
  .badge-running { background: #0d4429; color: #3fb950; border: 1px solid #238636; }
  .badge-idle { background: #2d1b00; color: #d29922; border: 1px solid #9e6a03; }
  .badge-down { background: #3d1419; color: #f85149; border: 1px solid #da3633; }
  .card .type {
    font-size: 11px; color: #8b949e; margin-top: 4px;
    display: flex; gap: 8px; align-items: center;
  }
  .card .type .tag {
    background: #21262d; padding: 1px 6px; border-radius: 4px; color: #58a6ff;
  }

  /* Activity bar */
  .activity-bar {
    margin-top: 10px; display: flex; align-items: center; gap: 8px;
  }
  .activity-label { font-size: 10px; color: #6e7681; min-width: 50px; }
  .activity-track {
    flex: 1; height: 4px; background: #21262d; border-radius: 2px; overflow: hidden;
  }
  .activity-fill {
    height: 100%; border-radius: 2px; transition: width 0.4s;
  }
  .activity-text { font-size: 10px; color: #6e7681; min-width: 40px; text-align: right; }

  /* Uptime */
  .uptime-row {
    margin-top: 6px; display: flex; align-items: center; gap: 8px; font-size: 11px;
  }
  .uptime-label { color: #6e7681; min-width: 50px; }
  .uptime-dots {
    display: flex; gap: 2px;
  }
  .uptime-dot {
    width: 6px; height: 14px; border-radius: 2px; background: #21262d;
  }

  .card .details {
    margin-top: 12px; font-size: 12px; color: #8b949e;
    display: grid; grid-template-columns: auto 1fr; gap: 4px 12px;
  }
  .card .details .key { color: #6e7681; }
  .card .details .val { color: #c9d1d9; }
  .card .pending {
    margin-top: 8px; font-size: 12px; color: #d29922;
  }

  /* Expandable section */
  .card .expanded-details {
    display: none; margin-top: 12px; padding-top: 12px;
    border-top: 1px solid #21262d;
  }
  .card.expanded .expanded-details { display: block; }
  .expanded-details .detail-grid {
    font-size: 12px; color: #8b949e;
    display: grid; grid-template-columns: auto 1fr; gap: 4px 12px;
  }
  .expanded-details .detail-grid .key { color: #6e7681; }
  .expanded-details .detail-grid .val { color: #c9d1d9; word-break: break-all; }
  .expand-hint {
    font-size: 10px; color: #484f58; margin-top: 8px; text-align: right;
  }
  .card.expanded .expand-hint { display: none; }

  /* Log viewer */
  .log-btn {
    background: #21262d; border: 1px solid #30363d; border-radius: 4px;
    color: #58a6ff; cursor: pointer; font-size: 11px; font-family: inherit;
    padding: 4px 10px; margin-top: 10px; transition: all 0.2s;
  }
  .log-btn:hover { background: #30363d; }
  .log-viewer {
    margin-top: 10px; background: #0d1117; border: 1px solid #21262d;
    border-radius: 4px; padding: 10px; max-height: 300px; overflow-y: auto;
    font-size: 11px; line-height: 1.5; color: #8b949e; white-space: pre-wrap;
    word-break: break-all; display: none;
  }
  .log-viewer.visible { display: block; }
  .log-viewer .log-line { }
  .log-viewer .log-loading { color: #6e7681; font-style: italic; }
  .log-viewer .log-error { color: #f85149; }

  /* Restart button */
  .restart-btn {
    background: #21262d; border: 1px solid #da3633; border-radius: 4px;
    color: #f85149; cursor: pointer; font-size: 11px; font-family: inherit;
    padding: 4px 10px; margin-top: 10px; margin-left: 6px; transition: all 0.2s;
  }
  .restart-btn:hover { background: #da3633; color: #fff; }
  .restart-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .restart-btn.success { border-color: #238636; color: #3fb950; background: #0d4429; }

  .updated { font-size: 11px; color: #484f58; text-align: center; margin-top: 20px; }
  .error { color: #f85149; text-align: center; padding: 40px; }
</style>
</head>
<body>
  <div class="header">
    <h1>Relay Live Metrics</h1>
    <div class="header-controls">
      <div class="view-toggle">
        <button class="view-btn active" id="view-grid" onclick="setView('grid')">Grid</button>
        <button class="view-btn" id="view-grouped" onclick="setView('grouped')">Grouped</button>
      </div>
      <a href="/sessions" style="color:#58a6ff;font-size:12px;text-decoration:none">Sessions</a>
      <a href="/tasks" style="color:#58a6ff;font-size:12px;text-decoration:none">Tasks</a>
      <a href="/agents" style="color:#58a6ff;font-size:12px;text-decoration:none">Agents</a>
      <a href="/orchestrator" style="color:#58a6ff;font-size:12px;text-decoration:none">Orchestrator</a>
      <a href="/pipeline" style="color:#58a6ff;font-size:12px;text-decoration:none">Pipeline</a>
      <a href="/config" style="color:#58a6ff;font-size:12px;text-decoration:none">Config</a>
      <span class="refresh" onclick="load()">Refresh</span>
    </div>
  </div>
  <div id="health"></div>
  <div class="stats" id="stats"></div>
  <div class="sort-bar" id="sortbar"></div>
  <div class="grid" id="grid"></div>
  <div class="updated" id="updated"></div>

<script>
const API = '/api/relay-metrics';
let currentSort = 'status';
let currentView = 'grid';
let currentData = [];

// Group mapping: derive from path or explicit group field
function getGroup(d) {
  if (d.group) return d.group;
  const path = (d.path || '').toLowerCase();
  if (path.includes('openclaw') || d.session === 'voice') return 'OpenClaw';
  if (path.includes('relay') || d.session === 'main' || d.session === 'copilot' || d.session === 'codex') return 'Infrastructure';
  if (path.includes('itops')) return 'IT Ops';
  if (d.host && d.host !== 'local') return 'Remote';
  return 'Projects';
}

function badgeClass(status) {
  if (status === 'running') return 'badge-running';
  if (status === 'not found' || status === 'exited' || status === 'error') return 'badge-down';
  return 'badge-idle';
}

function badgeLabel(status, lastAgo, pending) {
  if (status !== 'running') return status;
  if (pending > 0) return 'active';
  if (lastAgo && lastAgo.includes('s ago')) return 'active';
  if (lastAgo && (lastAgo.includes('m ago') || lastAgo.includes('h '))) {
    const match = lastAgo.match(/(\d+)h/);
    if (match && parseInt(match[1]) > 1) return 'idle';
  }
  return 'running';
}

function parseAgoMinutes(ago) {
  if (!ago || ago === 'unknown') return Infinity;
  let total = 0;
  const h = ago.match(/(\d+)h/);
  const m = ago.match(/(\d+)m/);
  const s = ago.match(/(\d+)s/);
  if (h) total += parseInt(h[1]) * 60;
  if (m) total += parseInt(m[1]);
  if (s) total += parseInt(s[1]) / 60;
  return total || Infinity;
}

function activityScore(d) {
  if (d.status !== 'running') return 0;
  const mins = parseAgoMinutes(d.last_active_ago);
  if (mins < 1) return 100;
  if (mins < 5) return 90;
  if (mins < 15) return 75;
  if (mins < 60) return 50;
  if (mins < 180) return 30;
  if (mins < 720) return 15;
  return 5;
}

function activityColor(score) {
  if (score >= 75) return '#3fb950';
  if (score >= 40) return '#d29922';
  if (score > 0) return '#6e7681';
  return '#3d1419';
}

function computeHealth(data) {
  if (data.length === 0) return { score: 0, running: 0, idle: 0, down: 0 };
  let running = 0, idle = 0, down = 0;
  data.forEach(d => {
    const label = badgeLabel(d.status, d.last_active_ago, d.pending_messages);
    if (label === 'active' || label === 'running') running++;
    else if (label === 'idle') idle++;
    else down++;
  });
  const score = Math.round(((running * 100) + (idle * 40)) / data.length);
  return { score, running, idle, down };
}

function healthColor(score) {
  if (score >= 70) return '#3fb950';
  if (score >= 40) return '#d29922';
  return '#f85149';
}

function sortData(data, by) {
  const statusOrder = { 'running': 0, 'idle': 1, 'not found': 2, 'exited': 3, 'error': 4 };
  return [...data].sort((a, b) => {
    if (by === 'name') return a.session.localeCompare(b.session);
    if (by === 'status') {
      const sa = statusOrder[a.status] ?? 5;
      const sb = statusOrder[b.status] ?? 5;
      if (sa !== sb) return sa - sb;
      return parseAgoMinutes(a.last_active_ago) - parseAgoMinutes(b.last_active_ago);
    }
    if (by === 'active') {
      return parseAgoMinutes(a.last_active_ago) - parseAgoMinutes(b.last_active_ago);
    }
    if (by === 'type') {
      return (a.type || '').localeCompare(b.type || '') || a.session.localeCompare(b.session);
    }
    if (by === 'group') {
      return getGroup(a).localeCompare(getGroup(b)) || a.session.localeCompare(b.session);
    }
    return 0;
  });
}

function toggleCard(id, event) {
  // Don't toggle if clicking log button or log viewer
  if (event && (event.target.closest('.log-btn') || event.target.closest('.log-viewer'))) return;
  document.getElementById(id)?.classList.toggle('expanded');
}

// Log viewer
async function toggleLogs(session, event) {
  event.stopPropagation();
  const viewer = document.getElementById(`logs-${session}`);
  if (!viewer) return;
  if (viewer.classList.contains('visible')) {
    viewer.classList.remove('visible');
    return;
  }
  viewer.classList.add('visible');
  viewer.innerHTML = '<span class="log-loading">Loading logs...</span>';
  try {
    const r = await fetch(`/api/session-logs?session=${encodeURIComponent(session)}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const text = await r.text();
    if (!text.trim()) {
      viewer.innerHTML = '<span class="log-loading">No logs available</span>';
    } else {
      viewer.textContent = text;
    }
  } catch (e) {
    viewer.innerHTML = `<span class="log-error">Failed to load logs: ${e.message}</span>`;
  }
  viewer.scrollTop = viewer.scrollHeight;
}

function renderCard(d) {
  const label = badgeLabel(d.status, d.last_active_ago, d.pending_messages);
  const cls = badgeClass(d.status);
  const score = activityScore(d);
  const aColor = activityColor(score);
  const cardId = `card-${d.session}`;

  return `
  <div class="card" id="${cardId}" onclick="toggleCard('${cardId}', event)">
    <div class="top">
      <a href="/sessions/${d.session}" class="name" style="color:#f0f6fc;text-decoration:none" onclick="event.stopPropagation()">${d.session}</a>
      <span class="badge ${cls}">${label}</span>
    </div>
    <div class="type">
      <span class="tag">${d.type}</span>
      <span>${d.host}</span>
    </div>
    <div class="activity-bar">
      <span class="activity-label">Activity</span>
      <div class="activity-track">
        <div class="activity-fill" style="width:${score}%;background:${aColor}"></div>
      </div>
      <span class="activity-text">${score}%</span>
    </div>
    <div class="details">
      <span class="key">Last active</span><span class="val">${d.last_active_ago || 'unknown'}</span>
      ${d.uptime ? `<span class="key">Uptime</span><span class="val">${d.uptime}</span>` : ''}
      ${d.memory_mb ? `<span class="key">Memory</span><span class="val">${d.memory_mb} MB</span>` : ''}
      ${d.pending_messages > 0 ? `<span class="key">Pending</span><span class="val" style="color:#d29922">${d.pending_messages} message(s)</span>` : ''}
    </div>
    <div class="expand-hint">click to expand</div>
    <div class="expanded-details">
      <div class="detail-grid">
        <span class="key">Container</span><span class="val">${d.container}</span>
        <span class="key">Path</span><span class="val">${d.path}</span>
        <span class="key">Thread ID</span><span class="val">${d.thread_id}</span>
        <span class="key">Status</span><span class="val">${d.status}</span>
        ${d.context ? `<span class="key">Context</span><span class="val">${d.context}</span>` : ''}
        ${d.last_active ? `<span class="key">Last active (ts)</span><span class="val">${new Date(d.last_active * 1000).toLocaleString()}</span>` : ''}
      </div>
      <button class="log-btn" onclick="toggleLogs('${d.session}', event)">Logs</button>
      <button class="restart-btn" id="restart-${d.session}" onclick="restartSession('${d.session}', event)">Restart</button>
      <div class="log-viewer" id="logs-${d.session}"></div>
    </div>
  </div>`;
}

function renderGridView(data) {
  const sorted = sortData(data, currentSort);
  document.getElementById('grid').innerHTML = sorted.map(d => renderCard(d)).join('');
}

function renderGroupedView(data) {
  const groups = {};
  data.forEach(d => {
    const g = getGroup(d);
    if (!groups[g]) groups[g] = [];
    groups[g].push(d);
  });

  // Sort groups: Infrastructure first, then alphabetical
  const groupOrder = ['Infrastructure', 'OpenClaw', 'IT Ops', 'Projects', 'Remote'];
  const sortedGroupNames = Object.keys(groups).sort((a, b) => {
    const ia = groupOrder.indexOf(a);
    const ib = groupOrder.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
  });

  let html = '';
  for (const name of sortedGroupNames) {
    const items = sortData(groups[name], currentSort);
    const running = items.filter(d => d.status === 'running').length;
    html += `
    <div class="group-section">
      <div class="group-header">
        <span class="group-name">${name}</span>
        <span class="group-count">${running}/${items.length} running</span>
      </div>
      <div class="group-grid">
        ${items.map(d => renderCard(d)).join('')}
      </div>
    </div>`;
  }
  document.getElementById('grid').innerHTML = html;
}

function setView(view) {
  currentView = view;
  document.getElementById('view-grid').classList.toggle('active', view === 'grid');
  document.getElementById('view-grouped').classList.toggle('active', view === 'grouped');
  renderContent(currentData);
}

function setSort(key) {
  currentSort = key;
  renderSortBar();
  renderContent(currentData);
}

function renderContent(data) {
  if (currentView === 'grouped') {
    renderGroupedView(data);
  } else {
    renderGridView(data);
  }
}

function renderHealth(data) {
  const h = computeHealth(data);
  const col = healthColor(h.score);
  document.getElementById('health').innerHTML = `
    <div class="health-bar">
      <div class="health-score" style="color:${col}">${h.score}</div>
      <div class="health-details">
        <div class="health-label">System Health</div>
        <div class="health-meter">
          <div class="health-meter-fill" style="width:${h.score}%;background:${col}"></div>
        </div>
        <div class="health-breakdown">
          <span><span class="dot" style="background:#3fb950"></span>Active: ${h.running}</span>
          <span><span class="dot" style="background:#d29922"></span>Idle: ${h.idle}</span>
          <span><span class="dot" style="background:#f85149"></span>Down: ${h.down}</span>
        </div>
      </div>
    </div>
  `;
}

function renderSortBar() {
  const sorts = [
    { key: 'status', label: 'Status' },
    { key: 'name', label: 'Name' },
    { key: 'active', label: 'Last Active' },
    { key: 'type', label: 'Type' },
  ];
  document.getElementById('sortbar').innerHTML =
    `<span>Sort by:</span>` +
    sorts.map(s =>
      `<button class="sort-btn${currentSort === s.key ? ' active' : ''}" onclick="setSort('${s.key}')">${s.label}</button>`
    ).join('');
}

function render(data) {
  currentData = data;
  const running = data.filter(d => d.status === 'running').length;
  const total = data.length;
  const pending = data.reduce((sum, d) => sum + (d.pending_messages || 0), 0);
  const totalMem = data.reduce((sum, d) => sum + (d.memory_mb || 0), 0);
  const types = {};
  data.forEach(d => { types[d.type] = (types[d.type] || 0) + 1; });

  renderHealth(data);

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="label">Sessions</div><div class="value">${running}/${total}</div></div>
    <div class="stat"><div class="label">Pending Msgs</div><div class="value">${pending}</div></div>
    <div class="stat"><div class="label">Total Memory</div><div class="value">${totalMem >= 1024 ? (totalMem/1024).toFixed(1)+'G' : totalMem+'M'}</div></div>
    ${Object.entries(types).map(([t,c]) => `<div class="stat"><div class="label">${t}</div><div class="value">${c}</div></div>`).join('')}
  `;

  renderSortBar();
  renderContent(data);

  document.getElementById('updated').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
}

async function load() {
  try {
    const r = await fetch(API);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    render(await r.json());
  } catch (e) {
    document.getElementById('grid').innerHTML = `<div class="error">Error loading metrics: ${e.message}</div>`;
  }
}

// Restart session
async function restartSession(session, event) {
  event.stopPropagation();
  const btn = document.getElementById(`restart-${session}`);
  if (!btn) return;
  if (!confirm(`Restart session "${session}"?`)) return;
  btn.disabled = true;
  btn.textContent = 'Restarting...';
  try {
    const r = await fetch('/api/session-restart', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    if (data.ok) {
      btn.textContent = `✓ ${data.current}`;
      btn.classList.add('success');
      setTimeout(() => load(), 3000);
    } else {
      btn.textContent = `Failed: ${data.error}`;
    }
  } catch (e) {
    btn.textContent = `Error: ${e.message}`;
  }
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = 'Restart';
    btn.classList.remove('success');
  }, 8000);
}

load();
setInterval(load, 10000);
</script>
</body>
</html>
